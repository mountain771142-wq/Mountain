<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your ticket</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .ticket-card {
            max-width: 380px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            padding: 28px 22px 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10);
            border: 1px solid #f0f0f0;
            color: #111827;
        }
        .ticket-header {
            display: flex;
            justify-content: space-between;
            padding-bottom: 14px;
            border-bottom: 2px solid #f1f5f9;
            margin-bottom: 12px;
        }
        .ticket-title { font-size: 20px; font-weight: 700; color: #0b1a33; }
        .ticket-close { color: #007aff; font-weight: 600; font-size: 16px; }
        .ticket-type { font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 6px; }
        .ticket-expiry { font-size: 26px; font-weight: 700; color: #0b1a33; margin: 8px 0; }
        .ticket-expiry small { font-size: 16px; font-weight: 500; color: #475569; margin-right: 6px; }
        .ticket-name { font-size: 20px; font-weight: 700; color: #0b1a33; margin: 6px 0 10px; }
        .ticket-details { font-size: 15px; color: #1e293b; line-height: 1.6; margin: 6px 0 14px; }
        .view-details { background: #007aff; color: white; border: none; padding: 12px 28px; border-radius: 40px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .footnote { text-align: center; font-size: 11px; color: #94a3b8; margin-top: 16px; }
        .bee-placeholder { font-size: 40px; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="ticket-card">
        <div class="ticket-header">
            <span class="ticket-title">Your ticket</span>
            <span class="ticket-close">Close</span>
        </div>
        <div class="ticket-type">Adult</div>
        <div class="ticket-expiry">
            <small>Expires in</small> <span id="timer">12 hrs 38 min.</span>
        </div>
        <div class="bee-placeholder">🐝 (النحلة ستظهر هنا)</div>
        <div class="ticket-name">1 Day Bee AnyBus</div>
        <div class="ticket-details">
            <div>✅ Valid on any bus in Greater Manchester</div>
            <div>🔒 Ticket locked to this device</div>
        </div>
        <button class="view-details" onclick="alert('View details clicked!')">View details</button>
        <div class="footnote">🐝 Bee Network | Powered by TfGM</div>
    </div>

    <script>
        let endOfDay = new Date();
        endOfDay.setHours(23, 59, 59, 999);
        let countDownDate = endOfDay.getTime();

        setInterval(function() {
            let now = new Date().getTime();
            let distance = countDownDate - now;
            if (distance > 0) {
                let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('timer').textContent = hours + " hrs " + minutes + " min.";
            } else {
                document.getElementById('timer').textContent = "EXPIRED";
            }
        }, 1000);
    </script>

</body>
</html>
