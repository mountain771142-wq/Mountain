<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Your ticket</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }

        /* التذكرة كبطاقة */
        .ticket-card {
            max-width: 420px;
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.10);
            position: relative;
            background: #ffffff;
            aspect-ratio: 9 / 16; /* نسبة الطول للعرض لتناسب التذكرة */
        }

        /* خلفية القالب بحجم كامل */
        .ticket-background {
            width: 100%;
            height: 100%;
            object-fit: cover; /* لتغطية المساحة كاملة بدون تشويه */
            display: block;
        }

        /* النحلة المتحركة */
        .bee-overlay {
            position: absolute;
            top: 55%; /* اضبط حسب مكان النحلة في القالب */
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            width: 50px;
            animation: flyBee 4s linear infinite;
        }
        @keyframes flyBee {
            0% { transform: translateX(-50px) scaleX(1); }
            49% { transform: translateX(50px) scaleX(1); }
            50% { transform: translateX(50px) scaleX(-1); }
            99% { transform: translateX(-50px) scaleX(-1); }
            100% { transform: translateX(-50px) scaleX(1); }
        }

        /* العداد التلقائي */
        .timer-overlay {
            position: absolute;
            top: 44%; /* اضبط حسب مكان العداد في القالب */
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 20px;
            font-weight: 700;
            color: #0b1a33;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 16px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .timer-overlay small {
            font-size: 14px;
            font-weight: 500;
            color: #475569;
            margin-right: 6px;
        }
    </style>
</head>
<body>

    <div class="ticket-card">
        <!-- القالب كخلفية (ليس كصورة عادية) -->
        <img src="img/template1.jfif" alt="ticket template" class="ticket-background">

        <!-- النحلة المتحركة -->
        <img src="img/bee.png" alt="bee" class="bee-overlay">

        <!-- العداد التلقائي -->
        <div class="timer-overlay">
            <small>Expires in</small> <span id="timer">12 hrs 38 min.</span>
        </div>
    </div>

    <script>
        // العداد التلقائي
        let endOfDay = new Date();
        endOfDay.setHours(23, 59, 59, 999);
        let countDownDate = endOfDay.getTime();

        setInterval(function() {
            let now = new Date().getTime();
            let distance = countDownDate - now;
            if (distance > 0) {
                let hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('timer').textContent = hours + " hrs " + minutes + " min.";
            } else {
                document.getElementById('timer').textContent = "EXPIRED";
            }
        }, 1000);
    </script>

</body>
</html>
